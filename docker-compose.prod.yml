# Produção: sem hot reload, sem bind mounts.
# Uso: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  api:
    build:
      target: production
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    volumes: !reset []

  frontend:
    build:
      target: production
    volumes: !reset []
    ports:
      - "${FRONTEND_PORT:-4200}:80"

  pgadmin:
    profiles: []
