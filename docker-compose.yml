# Base compartilhada entre dev e produção.
# Desenvolvimento: docker compose up
# Produção:       docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecommerce} -d ${POSTGRES_DB:-ecommerce}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: ecommerce-pgadmin
    restart: unless-stopped
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@ecommerce.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
      target: production
    container_name: ecommerce-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-ecommerce};Username=${POSTGRES_USER:-ecommerce};Password=${POSTGRES_PASSWORD:-changeme}
      Jwt__Issuer: ${JWT_ISSUER:-ecommerce-api}
      Jwt__Audience: ${JWT_AUDIENCE:-ecommerce-web}
      Jwt__Secret: ${JWT_SECRET:-EcommerceDevSecretKey_Min32Chars_ChangeInProd!}
      Cors__AllowedOrigins__0: ${CORS_ORIGIN:-http://localhost:4200}
    ports:
      - "${API_PORT:-5080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      target: production
    container_name: ecommerce-frontend
    restart: unless-stopped
    depends_on:
      - api

volumes:
  postgres_data:
  pgadmin_data:
